<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>线路示意图</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/partials.css">
</head>
<body>
    <div data-include="header"></div>
<!-- 图片展示区域-->
    <div class="map-container" id="mapContainer">
    <img src="../assets/images/全图.png" alt="服务器轨道交通线网图" class="subway-map" id="subwayMap">
        <div class="control-buttons">
            <button class="control-btn" id="zoomIn">+</button>
            <button class="control-btn" id="zoomOut">-</button>
            <button class="control-btn" id="reset">⟳</button>
        </div>
    </div>
    <!-- 下拉/信息按钮：用于选择子图与查看线路说明 -->
    <div class="dropdown-bar">
        <div class="dropdown-container">
            <select class="map-select" id="mapSelect">
                <option value="全图" selected>全图 Full Map</option>
                <option value="鲤湖湾州及鲤城">鲤湖湾州及鲤城 Leewoowae & Li City</option>
                <option value="大都会辖地">大都会辖地 Greater Politan Zone</option>
                <option value="第三城">第三城 City Three</option>
                <option value="铜钿城">铜钿城 Doondee City</option>
                <option value="铁路">铁路 Railway</option>
            </select>
            <button class="info-btn" id="infoBtn" title="信息">i</button>
        </div>
    </div>
<!-- 信息弹窗 -->
    <div class="info-modal" id="infoModal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <h2 id="modal-title">地图说明</h2>
            <div class="modal-body" id="info-text">
                <!-- Content injected via JS -->
            </div>
            <div class="modal-footer">
                <p data-i18n="contact">信息提供: 
                    <a href="https://github.com/LIYV6" target="_blank" style="color: #0000ee; text-decoration: underline">
                        Yv Li</a> + 
                    <a href="https://github.com/frankniubi" target="_blank" style="color: #0000ee; text-decoration: underline">
                        Frank Lau</a>
                </p>
                <!-- <p style="margin-top: 0.5rem; opacity: 0.8; font-size: 0.75rem;"></p> -->
            </div>
        </div>
    </div>
    <script src="../assets/js/include-fragments.js"></script>
    <script src="../assets/js/linemap.js"></script>
    <script src="../assets/js/mobile-nav.js"></script>

</body>
</html>
